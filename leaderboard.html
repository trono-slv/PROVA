<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Classifica Giornaliera - Quiz81</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{
      --navy-900:#0f172a;
      --cyan-500:#0ea5e9;
      --slate-200:#e2e8f0;
      --orange-500:#f97316;
      --emerald-500:#10b981;
      --glass: rgba(255,255,255,0.06);
    }
    .glass {
      background: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
      backdrop-filter: blur(6px) saturate(120%);
      border: 1px solid rgba(255,255,255,0.06);
    }
  </style>
</head>
<body class="min-h-screen bg-[var(--navy-900)] text-slate-200 antialiased">
  <div class="max-w-3xl mx-auto p-4">
    <header class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-semibold text-white">Classifica Giornaliera — Quiz81</h1>
      <a href="/index.html" class="px-3 py-2 rounded-md glass">🔙 Torna Quiz</a>
    </header>

    <section class="glass rounded-xl p-4 mb-4">
      <p class="text-sm text-slate-300">Classifica aggiornata. La classifica viene azzerata automaticamente ogni giorno (00:00 locale).</p>
      <p class="text-xs text-slate-400 mt-2" id="todayInfo"></p>
    </section>

    <section class="glass rounded-xl p-4 mb-4">
      <h2 class="text-lg text-white font-semibold mb-2">Top 10</h2>
      <ol id="leaderList" class="list-decimal pl-5 text-sm text-slate-200 space-y-2"></ol>
    </section>

    <section class="glass rounded-xl p-4">
      <h3 class="text-sm text-white font-semibold">Cerca la tua posizione</h3>
      <div class="mt-2 flex gap-2">
        <input id="searchName" class="flex-1 px-3 py-2 rounded-md bg-transparent border border-white/6" placeholder="Inserisci il nome usato nel quiz" />
        <button id="searchBtn" class="px-3 py-2 rounded-md bg-[var(--cyan-500)] text-black font-semibold">Cerca</button>
      </div>
      <div id="searchResult" class="mt-3 text-sm text-slate-300"></div>
    </section>

    <footer class="mt-6 text-xs text-slate-500">
      <p>© Quiz81 - Simulazione didattica.</p>
    </footer>
  </div>

  <script>
    const STORAGE_LEADERBOARD_KEY = 'quiz81_leaderboard';
    const STORAGE_DAILYKEY = 'quiz81_leaderboard_date';

    function dailyResetIfNeeded(){
      const todayISO = new Date().toISOString().slice(0,10);
      const storedDate = localStorage.getItem(STORAGE_DAILYKEY);
      if(storedDate !== todayISO){
        localStorage.setItem(STORAGE_DAILYKEY, todayISO);
        localStorage.setItem(STORAGE_LEADERBOARD_KEY, JSON.stringify([]));
      }
    }

    function loadLeaderboard(){
      dailyResetIfNeeded();
      const raw = localStorage.getItem(STORAGE_LEADERBOARD_KEY) || '[]';
      try { return JSON.parse(raw); } catch(e){ return []; }
    }

    function render(){
      const lb = loadLeaderboard();
      const list = document.getElementById('leaderList');
      list.innerHTML = '';
      if(lb.length === 0){
        list.innerHTML = '<li class="text-slate-400">Nessuna classifica per oggi</li>';
      } else {
        lb.slice(0,10).forEach((it, idx)=>{
          const li = document.createElement('li');
          li.innerHTML = `<div class="flex justify-between items-center">
            <div><strong class="text-white">${it.name}</strong> <span class="text-slate-300 text-xs">(${new Date(it.timestamp).toLocaleTimeString()})</span></div>
            <div class="text-slate-200">${it.score.toFixed(2)}</div>
          </div>`;
          list.appendChild(li);
        });
      }
      document.getElementById('todayInfo').textContent = `Data odierna: ${new Date().toLocaleDateString()}`;
    }

    document.getElementById('searchBtn').addEventListener('click', ()=>{
      const name = document.getElementById('searchName').value.trim();
      const out = document.getElementById('searchResult');
      if(!name){ out.textContent = 'Inserisci un nome.'; return; }
      const lb = loadLeaderboard();
      const index = lb.findIndex(it => it.name.toLowerCase() === name.toLowerCase());
      if(index === -1){ out.textContent = 'Non trovato nella classifica odierna.'; return; }
      const item = lb[index];
      out.innerHTML = `<div class="p-3 rounded-md bg-white/3">
        Posizione: <strong>${index+1}</strong><br/>
        Nome: <strong>${item.name}</strong><br/>
        Punteggio: <strong>${item.score.toFixed(2)}</strong><br/>
        Corrette: ${item.correct} - Sbagliate: ${item.wrong}<br/>
        Ora: ${new Date(item.timestamp).toLocaleString()}
      </div>`;
    });

    // Init
    render();
  </script>
</body>
</html>
